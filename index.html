<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARCO 前端展示｜Prototypes</title>
<style>
  :root{ --navy:#142356; --navy2:#21478C; --gold:#FFBF00; --tint:#eef0f7;
         --ink:#1f2430; --muted:#67708a; --line:#dde1ec; --bg:#f4f5f9; }
  *{box-sizing:border-box;}
  html{zoom:1.15;}
  body{margin:0;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
       color:var(--ink);background:var(--bg);font-size:17px;line-height:1.7;}
  .topbar{background:var(--navy);color:#fff;border-bottom:4px solid var(--gold);}
  .topbar .inner{max-width:920px;margin:0 auto;padding:16px 24px;}
  .brand{font-weight:900;font-size:20px;letter-spacing:.02em;}
  .brand .dot{color:var(--gold);}
  .brand small{display:block;font-weight:600;font-size:12px;color:#b9c2e0;letter-spacing:.05em;margin-top:2px;}
  .wrap{max-width:920px;margin:0 auto;padding:30px 24px 80px;}
  h1{font-size:26px;font-weight:900;color:var(--navy);margin:0 0 4px;}
  .sub{color:var(--muted);font-size:15px;margin:0 0 24px;}
  .card{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--line);
        border-left:5px solid var(--gold);border-radius:14px;padding:20px 22px;margin:0 0 16px;
        box-shadow:0 2px 16px rgba(20,35,86,.05);text-decoration:none;color:inherit;transition:.15s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(20,35,86,.12);border-left-color:var(--navy);}
  .card .ico{font-size:34px;flex:0 0 auto;}
  .card .body{flex:1;}
  .card h2{font-size:19px;font-weight:900;color:var(--navy);margin:0 0 2px;}
  .card p{font-size:14px;color:var(--muted);margin:0;}
  .card .go{font-weight:800;color:var(--navy2);flex:0 0 auto;font-size:15px;}
  .foot{color:var(--muted);font-size:13px;margin-top:28px;border-top:1px solid var(--line);padding-top:14px;}
</style>
</head>
<body>
<div class="topbar"><div class="inner">
  <div class="brand">STARCO<span class="dot">.</span> 前端展示<small>Prototypes · 給同事預覽的頁面</small></div>
</div></div>
<div class="wrap">
  <h1>頁面清單</h1>
  <p class="sub">以下為前端原型頁，點卡片即可開啟。純前端展示、無後端資料。</p>

  <a class="card" href="talent-radar.html">
    <span class="ico">📊</span>
    <span class="body">
      <h2>職務人才畫像雷達圖</h2>
      <p>用人主管設定職缺需求 → 即時產出能力雷達圖，含合理性自動提醒。</p>
    </span>
    <span class="go">開啟 →</span>
  </a>

  <!-- 之後新增頁面：複製上面一張 <a class="card"> 卡片、改連結與文字即可 -->

  <div class="foot">STARCO · 聯想感行銷科技</div>
</div>
</body>
</html>
