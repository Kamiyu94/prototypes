<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組織架構圖</title>
<style>
  :root{
    --ink:#1a1a17; --ink2:#54544c; --ink3:#83827a;
    --line:#e2e0d6; --line2:#c7c5b8;
    --paper:#f4f6fb; --card:#ffffff;
    --accent:#1B4C9E; --accent-soft:#e8eff9;
    --gold:#C8901A; --gold-soft:#f7edd3;
    --active:#2f6b4f; --active-bg:#e7f2eb;
    --probation:#9a6b1f; --probation-bg:#f8efdd;
    --tbc:#7a5aa8; --tbc-bg:#efe9f6;
    --tbh:#b14a3a; --tbh-bg:#f8e8e4;
    --leave:#2a6a8a; --leave-bg:#e3eff5;
    --incoming:#6b7a85; --incoming-bg:#eef1f3;
    --radius:14px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:16px}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(250,249,245,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:16px 24px}
  .topbar-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{font-size:23px;font-weight:600;letter-spacing:.5px}
  .brand .sub{font-size:14px;color:var(--ink3)}
  .spacer{flex:1}
  .search{position:relative}
  .search input{width:230px;padding:9px 14px 9px 38px;border:1px solid var(--line2);border-radius:10px;font-size:15px;background:var(--card);font-family:var(--font);transition:.15s}
  .search input:focus{outline:none;border-color:var(--accent);width:280px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink3)}
  .legend{display:flex;gap:15px;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2)}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .btn{padding:8px 15px;border:1px solid var(--line2);border-radius:9px;background:var(--card);font-size:14px;font-family:var(--font);cursor:pointer;color:var(--ink2);transition:.14s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .scroll-wrap{overflow:auto;padding:38px 24px 70px}
  .canvas{max-width:1320px;margin:0 auto;min-width:min-content}
  .tier{display:flex;justify-content:center;gap:26px;flex-wrap:nowrap}
  .node-wrap{display:flex;flex-direction:column;align-items:center;position:relative}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 18px;min-width:196px;max-width:226px;cursor:pointer;transition:.16s;position:relative;border-left-width:5px}
  .card:hover{border-color:var(--line2);box-shadow:0 5px 18px rgba(40,40,30,.09);transform:translateY(-1px)}
  .card.dim{opacity:.3}
  .card.hit{box-shadow:0 0 0 2px var(--gold),0 5px 18px rgba(40,40,30,.1)}
  .card .role{font-size:13px;color:var(--ink3);margin-bottom:4px;font-weight:500;letter-spacing:.2px}
  .card .nm{font-size:18px;font-weight:600;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .card .en{font-size:13.5px;color:var(--ink3);font-weight:400}
  .card .st-tag{display:inline-block;font-size:12px;padding:2px 9px;border-radius:20px;margin-top:9px;font-weight:500}
  .card[data-st="在職"]{border-left-color:var(--active)}
  .card[data-st="試用期"]{border-left-color:var(--probation)}
  .card[data-st="待確認"]{border-left-color:var(--tbc)}
  .card[data-st="待招募"]{border-left-color:var(--tbh);border-style:dashed;background:repeating-linear-gradient(135deg,#fff,#fff 10px,#fdfbf8 10px,#fdfbf8 20px)}
  .card[data-st="育嬰留停"]{border-left-color:var(--leave)}
  .card[data-st="未報到"]{border-left-color:var(--incoming);border-style:dashed;opacity:.5}
  .st-在職{background:var(--active-bg);color:var(--active)}
  .st-未報到{background:var(--incoming-bg);color:var(--incoming)}
  .st-試用期{background:var(--probation-bg);color:var(--probation)}
  .st-待確認{background:var(--tbc-bg);color:var(--tbc)}
  .st-待招募{background:var(--tbh-bg);color:var(--tbh)}
  .st-育嬰留停{background:var(--leave-bg);color:var(--leave)}
  .dept-group{background:rgba(22,48,92,.035);border:1px solid var(--line);border-radius:20px;padding:18px 18px 20px;display:flex;flex-direction:column;align-items:center;transition:.2s}
  .dept-head{display:flex;align-items:center;gap:10px;margin-bottom:15px;width:100%;justify-content:center;cursor:pointer;user-select:none}
  .dept-label{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:.8px;text-align:center}
  .collapse-ico{width:20px;height:20px;border:1px solid var(--line2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink2);background:var(--card);transition:.15s;flex-shrink:0}
  .dept-head:hover .collapse-ico{border-color:var(--accent);color:var(--accent)}
  .global-collapse{font-size:13px;padding:7px 16px;border-radius:20px;background:var(--accent-soft);border-color:transparent;color:var(--accent);font-weight:500}
  .global-collapse:hover{background:var(--accent);color:#fff;border-color:transparent}
  .vbar{width:1px;background:var(--line2);height:26px}
  /* 連接線系統：主幹 + 橫向匯流排 + 各節點落線 */
  .trunk{width:1px;background:var(--line2);height:24px;margin:0 auto}
  .branch-row{display:flex;justify-content:center;gap:26px;flex-wrap:nowrap;align-items:flex-start;position:relative;padding-top:24px}
  .branch-row::before{content:"";position:absolute;top:0;height:1px;background:var(--line2);left:var(--bus-left,25%);right:var(--bus-right,25%)}
  .branch-child{display:flex;flex-direction:column;align-items:center;position:relative}
  .branch-child::before{content:"";position:absolute;top:-24px;left:var(--drop-x,50%);width:1px;height:24px;background:var(--line2)}
  .members{display:flex;flex-direction:column;gap:13px}
  .members .card{min-width:222px;max-width:252px}
  .subgroups{display:flex;gap:22px;align-items:flex-start}
  .dept-collapsed{display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:4px}
  .mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:230px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center}
  .stat .v{font-size:22px;font-weight:700;line-height:1.1}
  .stat .k{font-size:11.5px;color:var(--ink3);margin-top:3px}
  .overlay{position:fixed;inset:0;background:rgba(30,30,24,.34);backdrop-filter:blur(2px);z-index:100;opacity:0;pointer-events:none;transition:.2s}
  .overlay.show{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;height:100%;width:380px;max-width:90vw;background:var(--card);box-shadow:-8px 0 30px rgba(30,30,24,.15);z-index:101;transform:translateX(100%);transition:.26s cubic-bezier(.4,0,.2,1);padding:30px 28px;overflow-y:auto}
  .panel.show{transform:translateX(0)}
  .panel .x{position:absolute;top:20px;right:20px;width:34px;height:34px;border:none;background:var(--paper);border-radius:9px;cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center}
  .panel .x:hover{background:var(--line)}
  .panel .p-role{font-size:14px;color:var(--accent);font-weight:600;letter-spacing:.5px;margin-bottom:7px}
  .panel .p-name{font-size:28px;font-weight:700;margin-bottom:3px}
  .panel .p-en{font-size:15px;color:var(--ink3);margin-bottom:22px}
  .panel .p-row{display:flex;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line);font-size:15px;gap:14px}
  .panel .p-row .k{color:var(--ink3);flex-shrink:0}
  .panel .p-row .v{font-weight:500;text-align:right;word-break:break-all}
  .footer-note{max-width:1320px;margin:0 auto;padding:0 24px 44px;font-size:14px;color:var(--ink3);line-height:1.7}
  .footer-note code{background:var(--accent-soft);padding:2px 7px;border-radius:5px;color:var(--accent);font-size:13px}
  .state{max-width:1320px;margin:60px auto;text-align:center;color:var(--ink3);font-size:16px}
  .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:var(--tbh);background:var(--tbh-bg);border:1px solid #eccac2;border-radius:12px;padding:18px 22px;max-width:560px;margin:40px auto;font-size:14px;line-height:1.7;text-align:left}
  @media (max-width:640px){.legend{width:100%;order:3}.search{flex:1}.search input{width:100%}}
  /* 混合版：深藍金 header（品牌感）+ 淺色內容（易讀） */
  .topbar{background:#1B4C9E;border-bottom:3px solid #FFC72C;backdrop-filter:blur(12px)}
  .topbar .brand h1{color:#ffffff}
  .topbar .brand .sub{color:#aeb8ca}
  .topbar .btn{background:transparent;border-color:#3c5080;color:#cdd6e6}
  .topbar .btn:hover{border-color:#FFC72C;color:#FFC72C}
  .topbar .search input{background:#fff;border-color:#3c5080}
  .topbar .search input:focus{border-color:#FFC72C}
  .topbar .search svg{color:#9aa6bd}
  .tooltip{position:fixed;z-index:200;left:0;top:0;background:rgba(20,20,16,.96);color:#fff;font-size:12.5px;line-height:1.45;padding:7px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .07s;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.24)}
  .tooltip.show{opacity:1}
  /* ───── 本月亮點：右下角浮動鈕 + 彈出卡（新進 / 壽星）───── */
  .hl-fab{position:fixed;right:24px;bottom:24px;z-index:40;display:none;align-items:center;gap:8px;
    background:var(--accent);color:#fff;border:none;border-radius:26px;padding:13px 20px 13px 18px;
    font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;
    box-shadow:0 6px 22px rgba(14,28,61,.28);transition:.16s}
  .hl-fab.on{display:inline-flex}
  .hl-fab:hover{background:#0e2247;transform:translateY(-1px);box-shadow:0 9px 26px rgba(14,28,61,.34)}
  .hl-fab .cnt{position:absolute;top:-7px;right:-6px;min-width:22px;height:22px;padding:0 6px;border-radius:12px;
    background:var(--gold);color:#3a2a00;font-size:12.5px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .hl-pop{position:fixed;right:24px;bottom:82px;z-index:41;width:320px;max-width:calc(100vw - 32px);
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 14px 40px rgba(20,20,16,.22);overflow:hidden;
    transform:translateY(10px) scale(.98);opacity:0;pointer-events:none;transform-origin:bottom right;transition:.18s cubic-bezier(.4,0,.2,1)}
  .hl-pop.show{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
  .hl-pop .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;background:var(--accent);color:#fff}
  .hl-pop .head .t{font-size:16px;font-weight:700;letter-spacing:.4px}
  .hl-pop .head .t small{font-weight:400;color:#c9d3e6;margin-left:2px}
  .hl-pop .head .x{width:28px;height:28px;border:none;background:rgba(255,255,255,.14);color:#fff;border-radius:8px;cursor:pointer;font-size:16px;line-height:1}
  .hl-pop .head .x:hover{background:rgba(255,255,255,.26)}
  .hl-sec{padding:14px 16px}
  .hl-sec+.hl-sec{border-top:1px solid var(--line)}
  .hl-sec .st{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;font-weight:700;color:var(--accent)}
  .hl-sec .st .dot{width:9px;height:9px;border-radius:50%}
  .hl-sec .st .num{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink3);background:var(--accent-soft);border-radius:20px;padding:1px 9px}
  .hl-list{display:flex;flex-wrap:wrap;gap:8px}
  .hl-pill{font-size:14px;background:var(--paper);border:1px solid var(--line2);border-radius:20px;padding:5px 13px;color:var(--ink);cursor:pointer;transition:.13s}
  .hl-pill:hover{border-color:var(--accent);color:var(--accent);background:#fff}
  .hl-hint{font-size:12px;color:var(--ink3);padding:0 16px 13px}
  .card.flash{animation:cardflash 1.6s ease-out}
  @keyframes cardflash{0%,60%{box-shadow:0 0 0 2px var(--flash-c,var(--gold)),0 5px 18px rgba(40,40,30,.1)}100%{box-shadow:none}}
  /* 壽星皇冠：點壽星跳到卡片時掛在左上角 */
  .crown-badge{position:absolute;top:-13px;left:-9px;font-size:22px;line-height:1;transform:rotate(-20deg);pointer-events:none;z-index:3;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));animation:crownpop .45s cubic-bezier(.34,1.56,.64,1)}
  .crown-badge.leaving{opacity:0;transition:opacity .4s ease}
  @keyframes crownpop{0%{transform:rotate(-20deg) scale(0);opacity:0}100%{transform:rotate(-20deg) scale(1);opacity:1}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand"><h1>組織架構圖</h1><span class="sub" id="hdr-sub">載入中…</span></div>
    <div class="spacer"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" placeholder="搜尋姓名 / 職位…" autocomplete="off">
    </div>
  </div>
</div>
<div class="scroll-wrap"><div class="canvas" id="canvas">
  <div class="state"><div class="spinner"></div>載入中…</div>
</div></div>
<div class="footer-note" id="fnote">組織架構圖 · 互動式原型 Demo · 範例資料、虛構人名、無實際後端　—　規劃 <b style="color:var(--accent)">Emily Ko</b> · 建置 <b style="color:var(--accent)">Kamiyu Lab</b></div>
<div class="overlay" id="ov" onclick="closePanel()"></div>
<aside class="panel" id="panel"></aside>
<div id="tip" class="tooltip"></div>
<!-- 本月亮點：浮動鈕 + 彈出卡（當月無人時整顆隱藏） -->
<button class="hl-fab" id="hlFab" onclick="toggleHl()">🎉 本月<span class="cnt" id="hlCnt">0</span></button>
<div class="hl-pop" id="hlPop"></div>

<script>
// ── 展示用假資料（虛構公司與人名，無真實個資）──
const FAKE_DATA = [
  {id:'ceo',      name:'陳建宏', en:'Marcus',  title:'執行長 CEO',   dept:'',     parent:'',        status:'在職', email:'marcus@example.com'},
  {id:'cso',      name:'潘立文', en:'Leon',    title:'策略長 CSO',   dept:'',     parent:'ceo',     status:'在職', email:'leon@example.com'},

  {id:'d_sales',  name:'王雅琪', en:'Vivian',  title:'業務部 主管',  dept:'業務部', parent:'ceo',    status:'在職', email:'vivian@example.com'},
  {id:'s1',       name:'陳冠廷', en:'Aaron',   title:'資深業務',     dept:'業務部', parent:'d_sales', status:'在職', email:'aaron@example.com'},
  {id:'s2',       name:'黃筱涵', en:'Nina',    title:'業務專員',     dept:'業務部', parent:'d_sales', status:'在職', email:'nina@example.com'},
  {id:'s3',       name:'林哲宇', en:'Ken',     title:'業務專員',     dept:'業務部', parent:'d_sales', status:'試用期', email:'ken@example.com'},

  {id:'d_mkt',    name:'張詠翔', en:'Kevin',   title:'行銷部 主管',  dept:'行銷部', parent:'ceo',    status:'在職', email:'kevin@example.com'},
  {id:'m1',       name:'劉庭瑋', en:'Leo',     title:'內容行銷',     dept:'行銷部', parent:'d_mkt',   status:'在職', email:'leo@example.com'},
  {id:'m2',       name:'蔡佩珊', en:'Grace',   title:'社群經營',     dept:'行銷部', parent:'d_mkt',   status:'在職', email:'grace@example.com'},

  {id:'d_product',name:'李思妤', en:'Sophie',  title:'產品部 主管',  dept:'產品部', parent:'ceo',    status:'在職', email:'sophie@example.com'},
  {id:'g_pm',     name:'郭子豪', en:'Ryan',    title:'產品組 組長',  dept:'產品組', parent:'d_product', status:'在職', email:'ryan@example.com'},
  {id:'p1',       name:'周芷若', en:'Emma',    title:'產品企劃',     dept:'產品組', parent:'g_pm',    status:'在職', email:'emma@example.com'},
  {id:'p2',       name:'何冠儒', en:'Ivan',    title:'產品企劃',     dept:'產品組', parent:'g_pm',    status:'在職', email:'ivan@example.com'},
  {id:'g_design', name:'楊千慧', en:'Tina',    title:'設計組 組長',  dept:'設計組', parent:'d_product', status:'在職', email:'tina@example.com'},
  {id:'dz1',      name:'沈佩君', en:'Chloe',   title:'UI／UX 設計',  dept:'設計組', parent:'g_design', status:'在職', email:'chloe@example.com'},

  {id:'d_tech',   name:'吳承恩', en:'Ethan',   title:'技術部 主管',  dept:'技術部', parent:'ceo',    status:'在職', email:'ethan@example.com'},
  {id:'g_fe',     name:'許志明', en:'Jason',   title:'前端組 組長',  dept:'前端組', parent:'d_tech',  status:'在職', email:'jason@example.com'},
  {id:'f1',       name:'賴宗翰', en:'Oscar',   title:'前端工程師',   dept:'前端組', parent:'g_fe',    status:'在職', email:'oscar@example.com'},
  {id:'g_be',     name:'曾雅雯', en:'Rebecca', title:'後端組 組長',  dept:'後端組', parent:'d_tech',  status:'在職', email:'rebecca@example.com'},
  {id:'b1',       name:'邱建豪', en:'Sam',     title:'後端工程師',   dept:'後端組', parent:'g_be',    status:'在職', email:'sam@example.com'},
  {id:'b2',       name:'羅子維', en:'Tim',     title:'後端工程師',   dept:'後端組', parent:'g_be',    status:'試用期', email:'tim@example.com'},

  {id:'d_admin',  name:'林宜蓁', en:'Claire',  title:'管理部 主管',  dept:'管理部', parent:'ceo',    status:'在職', email:'claire@example.com'},
  {id:'a1',       name:'徐慧敏', en:'Doris',   title:'人資／行政',   dept:'管理部', parent:'d_admin', status:'在職', email:'doris@example.com'},
  {id:'a2',       name:'高子晴', en:'Fiona',   title:'財務會計',     dept:'管理部', parent:'d_admin', status:'在職', email:'fiona@example.com'},
];
// 本月亮點（新進 / 壽星）——展示用
const FAKE_HL = {
  month: (new Date().getMonth()+1),
  newHires: [{name:'林哲宇'}, {name:'羅子維'}],
  birthdays: [{name:'黃筱涵'}, {name:'李思妤'}, {name:'邱建豪'}],
};
let DATA=[], byId={};
const collapsed={};
const kids = id => DATA.filter(d=>d.parent===id);
const isContainer = id => /^(d_|g_)/.test(String(id));   // 部門/組/幕僚單位的「框」
// 空框（如尚未設人的執行長室）的佔位卡：顯示標題＋「尚未設置成員」，不留空白
function emptyOfficeCard(dep){
  return '<div class="card" style="border-left-color:var(--line2,#c7c5b8);border-style:dashed">'
    +'<div class="role">'+(dep.dept||'')+'</div>'
    +'<div class="nm" style="font-size:14px;color:var(--ink3);font-weight:500">尚未設置成員</div></div>';
}

// 部門配色（鋼彈藍白黃家族）：label=標籤文字色；bg=區塊極淡底色。
const DEPT_COLORS = {
  '業務部': {label:'#1B4C9E', bg:'rgba(27,76,158,.06)'},   // 鋼彈藍：營收核心
  '行銷部': {label:'#9a7500', bg:'rgba(255,199,44,.14)'},  // 鋼彈黃：品牌行銷
  '產品部': {label:'#2E6BC6', bg:'rgba(46,107,198,.07)'},  // 亮藍：產品
  '技術部': {label:'#155a8a', bg:'rgba(21,90,138,.06)'},   // 深青藍：工程
  '管理部': {label:'#a85d7c', bg:'rgba(196,118,156,.08)'}, // 霧玫瑰：行政支援（與藍家族區隔）
  '產品組': {label:'#2E6BC6', bg:'rgba(46,107,198,.05)'},
  '設計組': {label:'#9a7500', bg:'rgba(255,199,44,.09)'},
  '前端組': {label:'#1B4C9E', bg:'rgba(27,76,158,.05)'},
  '後端組': {label:'#155a8a', bg:'rgba(21,90,138,.05)'},
};
function deptColor(name){ return DEPT_COLORS[name] || {label:'var(--accent)', bg:'rgba(22,48,92,.035)'}; }
// 同一人兼任父子職位時：只畫一張卡、職稱合併（避免「自己當自己上司」）
function personKey(d){ return d && d.name && String(d.name).trim() ? String(d.name).trim()+'|'+String(d.en||'').trim() : null; }
function mergedTitle(d){ var t=d.title; kids(d.id).forEach(function(c){ if(personKey(c) && personKey(c)===personKey(d)) t+='・'+c.title; }); return t; }
function isMergedIntoParent(d){ var p=d.parent?byId[d.parent]:null; return !!(p && personKey(d) && personKey(d)===personKey(p)); }

// ── 簡易 CSV 解析（處理引號、逗號、換行）──
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function loadData(){
  DATA = FAKE_DATA;
  byId = Object.fromEntries(DATA.map(d=>[d.id,d]));
  render();
  renderHighlights(FAKE_HL);
}

// ── 本月亮點：浮動鈕 + 彈出卡 ──
function escHl(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function renderHighlights(h){
  var fab=document.getElementById('hlFab'), pop=document.getElementById('hlPop');
  if(!fab||!pop) return;
  var nh=(h&&h.newHires)||[], bd=(h&&h.birthdays)||[];
  var total=nh.length+bd.length;
  if(total===0){ fab.classList.remove('on'); pop.classList.remove('show'); pop.innerHTML=''; return; }  // 當月無人＝整顆不顯示
  document.getElementById('hlCnt').textContent=total;
  fab.classList.add('on');
  var m=h.month||'';
  function sec(dot,label,list,kind){
    if(!list.length) return '';
    var pills=list.map(function(x){ return '<span class="hl-pill" data-kind="'+kind+'" data-name="'+escHl(x.name)+'">'+escHl(x.name)+'</span>'; }).join('');
    return '<div class="hl-sec"><div class="st"><span class="dot" style="background:'+dot+'"></span>'+label
      +'<span class="num">'+list.length+'</span></div><div class="hl-list">'+pills+'</div></div>';
  }
  pop.innerHTML='<div class="head"><div class="t">'+m+' 月<small>・本月亮點</small></div>'
    +'<button class="x" onclick="toggleHl(false)">✕</button></div>'
    +sec('var(--active)','新進人員',nh,'hire')
    +sec('var(--gold)','壽星',bd,'birth')
    +'<div class="hl-hint">點名字可跳到組織圖上的位置</div>';
}
var hlOpen=false;
function toggleHl(force){
  var pop=document.getElementById('hlPop');
  hlOpen=(typeof force==='boolean')?force:!pop.classList.contains('show');
  pop.classList.toggle('show',hlOpen);
}
// 點名字 → 捲到並閃爍高亮該人在組織圖上的卡片（新進＝綠、壽星＝金）
function jumpToPerson(name,kind){
  toggleHl(false);
  var key=String(name||'').trim();
  var cards=document.querySelectorAll('.card[data-id]');
  var target=null;
  for(var i=0;i<cards.length;i++){ var d=byId[cards[i].dataset.id]; if(d&&String(d.name).trim()===key){ target=cards[i]; break; } }
  if(!target) return;
  document.querySelectorAll('.card.flash').forEach(function(c){ c.classList.remove('flash'); });
  document.querySelectorAll('.crown-badge').forEach(function(el){ el.remove(); });   // 清掉上一頂皇冠
  target.style.setProperty('--flash-c', kind==='birth' ? 'var(--gold)' : 'var(--active)');
  target.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
  // 觸發動畫（強制重繪）
  void target.offsetWidth; target.classList.add('flash');
  setTimeout(function(){ target.classList.remove('flash'); },1700);
  if(kind==='birth'){   // 壽星掛皇冠：閃動(1.7s)結束後再停留 3 秒，然後淡出移除
    var cr=document.createElement('span'); cr.className='crown-badge'; cr.textContent='👑'; target.appendChild(cr);
    setTimeout(function(){ cr.classList.add('leaving'); setTimeout(function(){ if(cr.parentNode) cr.parentNode.removeChild(cr); },400); }, 1700+3000);
  }
}
// 彈出卡內名字點擊（事件委派）
document.getElementById('hlPop').addEventListener('click',function(e){
  var pill=e.target.closest?e.target.closest('.hl-pill'):null;
  if(pill) jumpToPerson(pill.getAttribute('data-name'), pill.getAttribute('data-kind'));
});
// 點浮層與浮動鈕以外的地方→收起
document.addEventListener('click',function(e){
  if(!hlOpen) return;
  var pop=document.getElementById('hlPop'), fab=document.getElementById('hlFab');
  if(!pop.contains(e.target) && !fab.contains(e.target)) toggleHl(false);
});

function dispName(d){ return d.name + (d.en?' ('+d.en+')':''); }
function cardHtml(d){
  // 公開版：不顯示狀態標籤與狀態色
  const en=d.en?'<span class="en">'+d.en+'</span>':'';
  const role=mergedTitle(d);
  const tip=(d.name+(d.en?' '+d.en:'')+' ｜ '+role+(d.email?' ｜ '+d.email:'')).replace(/"/g,'');
  return '<div class="card" data-tip="'+tip+'" data-id="'+d.id+'" onclick="openPanel(\''+d.id+'\')">'
    +'<div class="role">'+role+'</div><div class="nm">'+d.name+en+'</div></div>';
}
function memberList(pid){ const l=sortedKids(pid); return l.length?'<div class="members">'+l.map(cardHtml).join('')+'</div>':''; }
// 顯示排序：在職/試用/育嬰在上 → 未報到 → 待招募/待確認(職缺)沉到最底
function sortedKids(pid){
  const rank=s=>(s==='待招募'||s==='待確認')?2:(s==='未報到'?1:0);
  return kids(pid).slice().sort((a,b)=>rank(a.status)-rank(b.status));
}
function deptStats(depId, includeSelf=true){
  // 以「人」為單位去重：同姓名+英文名只算一次；空缺(待招募/待確認)各自獨立計算
  // includeSelf=true（部門用）：統計範圍含該節點本身（主管），呈現「部門全部人頭」
  // includeSelf=false（組用）：不含組節點本身（組長已另以卡片呈現），呈現「組員人數」
  const seen=new Set();
  let filled=0, open=0, incoming=0;
  function count(node){
    if(node.status==='待招募'||node.status==='待確認'){ open++; return; }  // 職缺（待補）
    const key=node.name+'|'+node.en;
    if(node.name && !seen.has(key)){
      seen.add(key);
      if(node.status==='未報到') incoming++;  // 即將報到：不計入目前人數
      else filled++;
    }
  }
  const self=byId[depId];
  if(self && includeSelf){
    // CEO 若兼任部門主管，不在該部門重複計人——他已計在最上層
    const ceo = DATA.find(d=>!d.parent) || byId['ceo'];
    const isCeoDup = ceo && self.id!==ceo.id && (self.name+'|'+self.en)===(ceo.name+'|'+ceo.en);
    if(!isCeoDup) count(self);
  }
  (function walk(p){kids(p).forEach(k=>{ count(k); walk(k.id); });})(depId);
  return {filled,open,incoming,total:filled+open};
}
// 編制 = 該範圍所有卡片數（目前 + 即將報到 + 待補），由卡片自動加總，不需手動維護編制員額
function deptCapacity(id){
  const s=deptStats(id);
  return s.filled + s.incoming + s.open;
}
// 適足率 = 目前人數 ÷ 編制（卡片總數）；只在部門層顯示
function adequacyHtml(depId){
  const cap=deptCapacity(depId);
  if(!cap) return '';
  const f=deptStats(depId).filled;
  const pct=Math.round(f/cap*100);
  const color = pct>=90?'var(--active)':(pct>=70?'var(--probation)':'var(--tbh)');
  return '<div style="font-size:12.5px;color:var(--ink3);padding:1px 0 6px 28px">'
    +'人力配置適足率 <b style="color:'+color+'">'+pct+'%</b>'
    +' <span style="color:var(--ink3)">（目前 '+f+' / 編制 '+cap+'）</span></div>';
}
// 全公司適足率 = 全公司目前人數 ÷ 全公司卡片總數（目前+即將報到+待補）
function companyAdequacyHtml(ceoId){
  const cs=companyStats(ceoId);
  const cap=cs.filled+cs.incoming+cs.open;
  if(!cap) return '';
  const f=cs.filled;
  const pct=Math.round(f/cap*100);
  const color = pct>=90?'var(--active)':(pct>=70?'var(--probation)':'var(--tbh)');
  return '<div style="font-size:13px;color:var(--ink3);padding:1px 0 8px 28px">'
    +'全公司人力配置適足率 <b style="color:'+color+'">'+pct+'%</b>'
    +' <span style="color:var(--ink3)">（目前 '+f+' / 編制 '+cap+'）</span></div>';
}
function deptGroupHtml(dep){
  const s=deptStats(dep.id), isCol=deptLayerCollapsed; // 部層級全域連動：任一部收合＝全部門一起收
  const sub=kids(dep.id), subGroups=sub.filter(x=>kids(x.id).length>0); const headMerged=isMergedIntoParent(dep);
  const depHasLeader = dep.name && String(dep.name).trim();   // 幕僚單位（如執行長室）無專屬主管，不畫空白主管卡
  let inner;
  if(isCol){
    inner='<div class="dept-collapsed">'+(depHasLeader?cardHtml(dep):'')
      +'<div class="mini-stats" style="grid-template-columns:1fr">'
      +'<div class="stat"><div class="v">'+s.filled+'</div><div class="k">目前人數</div></div>'
      +'</div></div>';
  }else{
    if(subGroups.length){
      // 組層級全域連動：任一組收合＝全公司所有組一起收/開
      const layerCollapsed = groupLayerCollapsed;
      inner=((headMerged||!depHasLeader)?'':cardHtml(dep)+'<div class="vbar"></div>')+'<div class="subgroups">'
        +subGroups.map(sg=>{
          const hasLeader = sg.name && sg.name.trim() && !isMergedIntoParent(sg);
          const body = layerCollapsed
            ? subCollapsed(sg)
            : (hasLeader ? cardHtml(sg)+'<div class="vbar"></div>' : '') + memberList(sg.id);
          const sc=deptColor(sg.dept);
          return '<div class="dept-group" style="background:'+sc.bg+'">'
            +'<div class="dept-head" onclick="event.stopPropagation();toggleGroupLayer(\''+dep.id+'\')">'
            +'<span class="collapse-ico">'+(layerCollapsed?'+':'−')+'</span>'
            +'<span class="dept-label" style="font-size:16px;color:'+sc.label+'">'+sg.dept+'</span></div>'
            +body+'</div>';
        }).join('')+'</div>';
    }else{
      var ml=memberList(dep.id);
      if(headMerged||!depHasLeader) inner = ml || emptyOfficeCard(dep);   // 無主管且無成員＝空框，給佔位卡
      else inner = cardHtml(dep)+'<div class="vbar"></div>'+ml;
    }
  }
  const dc=deptColor(dep.dept);
  return '<div class="dept-group" style="background:'+dc.bg+'"><div class="dept-head" onclick="toggleDept(\''+dep.id+'\')">'
    +'<span class="collapse-ico">'+(isCol?'+':'−')+'</span><span class="dept-label" style="color:'+dc.label+'">'+dep.dept+'</span></div>'
    +inner+'</div>';
}
function subCollapsed(sg){
  const s=deptStats(sg.id, false); // 組層級：人數不含組長
  const hasLeader = sg.name && sg.name.trim();
  const leaderCard = hasLeader ? cardHtml(sg) : '<div class="card" data-st="在職" style="border-left-color:var(--accent)"><div class="role">'+sg.dept+'</div><div class="nm" style="font-size:15px;color:var(--ink3)">（無組長）</div></div>';
  return '<div class="dept-collapsed">'+leaderCard+'<div class="mini-stats" style="grid-template-columns:1fr">'
    +'<div class="stat"><div class="v">'+s.filled+'</div><div class="k">目前人數</div></div>'
    +'</div></div>';
}
function render(){
  const ceo=DATA.find(d=>!d.parent)||byId['ceo'];
  if(!ceo){ document.getElementById('canvas').innerHTML='<div class="err">找不到頂層節點（沒有上層ID為空的列）</div>'; return; }
  const ceoCol=collapsed[ceo.id];
  // CEO 卡片：自己也有收合鈕，點它＝全公司收合/展開
  let kaiCard='<div class="dept-group" style="background:transparent;border:none;padding:0">'
    +'<div class="dept-head" onclick="toggleCompany(\''+ceo.id+'\')">'
    +'<span class="collapse-ico">'+(ceoCol?'+':'−')+'</span>'
    +'<span class="dept-label">'+ceo.dept+'公司</span></div>';
  if(ceoCol){
    const cs=companyStats(ceo.id);
    kaiCard+='<div class="dept-collapsed">'+cardHtml(ceo)
      +'<div class="mini-stats" style="grid-template-columns:1fr">'
      +'<div class="stat"><div class="v">'+cs.filled+'</div><div class="k">目前人數</div></div>'
      +'</div></div></div>';
    document.getElementById('canvas').innerHTML='<div class="tier">'+kaiCard+'</div>';
    afterRender(ceo); return;
  }
  kaiCard+='<div class="node-wrap">'+cardHtml(ceo)+'</div></div>';
  // KC(CBO) 與各部長同階（皆 CEO 直屬），排同一列；有下屬者畫部門塊、無下屬者(如 KC)畫單卡
  let html='<div class="tier">'+kaiCard+'</div>';
  html+='<div class="trunk"></div>';
  html+='<div class="branch-row" id="branch-row">';
  kids(ceo.id).forEach(node=>{
    // 「框」(d_/g_)一律畫成部門塊，即使目前還沒成員（空框顯示佔位卡）；一般人才畫單卡
    const inner = (kids(node.id).length>0 || isContainer(node.id)) ? deptGroupHtml(node) : '<div class="node-wrap">'+cardHtml(node)+'</div>';
    html+='<div class="branch-child">'+inner+'</div>';
  });
  html+='</div>';
  document.getElementById('canvas').innerHTML=html;
  alignBus();
  afterRender(ceo);
  requestAnimationFrame(function(){ requestAnimationFrame(alignBus); });
}
function afterRender(ceo){
  const cs=companyStats(ceo.id);
  document.getElementById('hdr-sub').textContent='全公司 '+cs.filled+' 人';
}
// 全公司統計（去重，排除 CEO 與 KC 本身不算重複，但其下成員照去重）
function companyStats(ceoId){
  const seen=new Set(); let filled=0, open=0, incoming=0;
  function count(k){
    if(k.status==='待招募'||k.status==='待確認'){ open++; return; }
    const key=k.name+'|'+k.en;
    if(k.name && !seen.has(key)){ seen.add(key); if(k.status==='未報到') incoming++; else filled++; }
  }
  (function walk(p){kids(p).forEach(k=>{ count(k); walk(k.id); });})(ceoId);
  if(ceoId){ const c=byId[ceoId]; if(c) count(c); }  // 把 CEO 自己也算進
  return {filled,open,incoming};
}
// 把頂層橫向匯流排對齊到第一個與最後一個子節點「頂部卡片」的中心
function alignBus(){
  const row=document.getElementById('branch-row'); if(!row) return;
  const children=[...row.children]; if(children.length<2){ row.style.setProperty('--bus-left','50%'); row.style.setProperty('--bus-right','50%'); return; }
  const rowBox=row.getBoundingClientRect();
  const topCard=el=>{ const c=el.querySelector('.card'); return (c||el).getBoundingClientRect(); };
  const first=topCard(children[0]);
  const last=topCard(children[children.length-1]);
  const leftCenter=first.left+first.width/2-rowBox.left;
  const rightCenter=last.left+last.width/2-rowBox.left;
  row.style.setProperty('--bus-left',leftCenter+'px');
  row.style.setProperty('--bus-right',(rowBox.width-rightCenter)+'px');
  // 同步把每個子節點的落線對到它自己頂部卡片的中心
  children.forEach(ch=>{
    const cb=topCard(ch); const center=cb.left+cb.width/2-ch.getBoundingClientRect().left;
    ch.style.setProperty('--drop-x',center+'px');
  });
}
window.addEventListener('resize',()=>{ if(document.getElementById('branch-row')) alignBus(); });
// 部層級全域連動：點任一部門收合鈕＝所有部門一起收/開
let deptLayerCollapsed=false;
function toggleDept(id){
  deptLayerCollapsed=!deptLayerCollapsed;
  // 展開部門時，組層級一律歸回收合：一次只開一層，不記憶之前「組」的展開狀態
  if(!deptLayerCollapsed) groupLayerCollapsed=true;
  render();
}
// 組層級全域連動：點任一組收合鈕＝全公司所有組一起收/開
let groupLayerCollapsed=false;
function toggleGroupLayer(deptId){ groupLayerCollapsed=!groupLayerCollapsed; render(); }
// 點 CEO：收合＝整間公司只剩一張 CEO 卡（連同所有部門與組）；展開＝全部攤開
function toggleCompany(ceoId){
  collapsed[ceoId]=!collapsed[ceoId];
  render();
}
function openPanel(id){
  const d=byId[id]; const parent=d.parent?byId[d.parent]:null;
  const p=document.getElementById('panel');
  // 公開版：詳情面板不顯示狀態
  let rows='<div class="p-row"><span class="k">部門</span><span class="v">'+(d.dept||'—')+'</span></div>';
  if(d.email) rows+='<div class="p-row"><span class="k">Email</span><span class="v"><a href="mailto:'+d.email+'" style="color:var(--accent);text-decoration:none">'+d.email+'</a></span></div>';
  if(parent) rows+='<div class="p-row"><span class="k">直屬上層</span><span class="v">'+dispName(parent)+'</span></div>';
  if(kids(d.id).length) rows+='<div class="p-row"><span class="k">直接下屬</span><span class="v">'+kids(d.id).length+' 人</span></div>';
  p.innerHTML='<button class="x" onclick="closePanel()">✕</button><div class="p-role">'+mergedTitle(d)+'</div>'
    +'<div class="p-name">'+d.name+'</div>'
    +'<div class="p-en">'+(d.en||'')+'</div>'+rows;
  p.classList.add('show'); document.getElementById('ov').classList.add('show');
}
function closePanel(){ document.getElementById('panel').classList.remove('show'); document.getElementById('ov').classList.remove('show'); }
document.getElementById('q').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase(); const cards=document.querySelectorAll('.card');
  if(!q){cards.forEach(c=>c.classList.remove('dim','hit'));return;}
  cards.forEach(c=>{const d=byId[c.dataset.id];const hay=(d.name+' '+d.en+' '+d.title+' '+d.dept).toLowerCase();
    if(hay.includes(q)){c.classList.add('hit');c.classList.remove('dim');}else{c.classList.add('dim');c.classList.remove('hit');}});
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();toggleHl(false);}});
loadData();
(function(){
  var tip=document.getElementById('tip');
  function card(e){ return e.target.closest ? e.target.closest('.card[data-tip]') : null; }
  document.addEventListener('mouseover',function(e){ var c=card(e); if(c){ tip.textContent=c.getAttribute('data-tip'); tip.classList.add('show'); } });
  document.addEventListener('mouseout',function(e){ if(card(e)) tip.classList.remove('show'); });
  document.addEventListener('mousemove',function(e){
    if(!tip.classList.contains('show')) return;
    var r=tip.getBoundingClientRect(), x=e.clientX+14, y=e.clientY+16;
    if(x+r.width>innerWidth-8) x=e.clientX-r.width-14;
    if(y+r.height>innerHeight-8) y=e.clientY-r.height-16;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  });
})();
